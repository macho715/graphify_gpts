apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: graphify-backend
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containers:
        - image: gcr.io/PROJECT_ID/graphify-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: GRAPHIFY_AUTH_MODE
              value: bearer
            - name: GRAPHIFY_DATA_DIR
              value: /tmp/graphify
            - name: GRAPHIFY_WORK_DIR
              value: /tmp/graphify/workspaces
            - name: GRAPHIFY_GRAPH_DIR
              value: /tmp/graphify/graphs
            - name: GRAPHIFY_ARTIFACT_DIR
              value: /tmp/graphify/artifacts
            - name: GRAPHIFY_AUDIT_LOG
              value: /tmp/graphify/audit.jsonl
